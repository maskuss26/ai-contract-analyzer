import { motion } from 'framer-motion'
import { Activity, Zap, FileText, Clock, Cpu } from 'lucide-react'

export default function TokenUsage({ data }) {
  const maxTokens = Math.max(...data.history.map(d => d.tokens))

  const riskColor = (score) => {
    if (score >= 60) return 'text-red-400'
    if (score >= 40) return 'text-amber-400'
    return 'text-emerald-400'
  }

  const riskBg = (score) => {
    if (score >= 60) return 'bg-red-500/10 border-red-500/20'
    if (score >= 40) return 'bg-amber-500/10 border-amber-500/20'
    return 'bg-emerald-500/10 border-emerald-500/20'
  }

  return (
    <motion.div
      initial={{ opacity: 0, y: 12 }}
      animate={{ opacity: 1, y: 0 }}
      transition={{ duration: 0.4 }}
    >
      {/* Header */}
      <div className="mb-8">
        <h1 className="text-2xl font-bold text-[var(--color-text)] mb-1">Token Usage Dashboard</h1>
        <p className="text-sm text-[var(--color-text-muted)]">
          MiMo API consumption metrics · Powered by Xiaomi MiMo-7B-RL
        </p>
      </div>

      {/* Metric Cards */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-8">
        <StatCard icon={Zap} label="Total Tokens Used" value={data.totalTokensUsed.toLocaleString()} sub="Lifetime" color="text-indigo-400" />
        <StatCard icon={FileText} label="Total Analyses" value={data.totalAnalyses.toString()} sub="All time" color="text-emerald-400" />
        <StatCard icon={Activity} label="Tokens Today" value={data.tokensToday.toLocaleString()} sub={`${data.analysesToday} analyses`} color="text-amber-400" />
        <StatCard icon={Clock} label="Avg Response" value={data.modelInfo.avgResponseTime} sub="Per analysis" color="text-cyan-400" />
      </div>

      {/* Chart + Model Info */}
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-8">
        {/* Bar Chart */}
        <div className="lg:col-span-2 p-5 rounded-xl border border-[var(--color-border-subtle)] bg-[var(--color-surface)]">
          <div className="flex items-center justify-between mb-5">
            <div>
              <h3 className="text-sm font-semibold text-[var(--color-text)]">Token Consumption (7 days)</h3>
              <p className="text-xs text-[var(--color-text-muted)] mt-0.5">Daily API usage breakdown</p>
            </div>
          </div>

          {/* Bar Chart or Empty State */}
          <div className="flex items-end gap-2 h-40">
            {data.history.length > 0 ? data.history.map((day, i) => {
              const height = (day.tokens / maxTokens) * 100
              const isToday = i === data.history.length - 1
              return (
                <div key={i} className="flex-1 flex flex-col items-center gap-1.5">
                  <span className="text-[9px] text-[var(--color-text-muted)] font-mono">
                    {(day.tokens / 1000).toFixed(1)}k
                  </span>
                  <motion.div
                    initial={{ height: 0 }}
                    animate={{ height: `${height}%` }}
                    transition={{ delay: i * 0.08, duration: 0.5, ease: 'easeOut' }}
                    className={`w-full rounded-md ${isToday ? 'bg-indigo-500 shadow-lg shadow-indigo-500/20' : 'bg-[var(--color-surface-2)] hover:bg-[var(--color-border)] transition-colors'}`}
                  />
                  <span className="text-[9px] text-[var(--color-text-muted)]">
                    {new Date(day.date).toLocaleDateString('en', { weekday: 'short' })}
                  </span>
                </div>
              )
            }) : (
              <div className="flex-1 flex items-center justify-center h-full">
                <p className="text-xs text-[var(--color-text-muted)]">No usage data yet. Run your first analysis to start tracking.</p>
              </div>
            )}
          </div>
        </div>

        {/* Model Info */}
        <div className="p-5 rounded-xl border border-[var(--color-border-subtle)] bg-[var(--color-surface)]">
          <div className="flex items-center gap-2 mb-4">
            <div className="flex items-center justify-center w-8 h-8 rounded-lg bg-indigo-500/10 border border-indigo-500/20">
              <Cpu size={14} className="text-indigo-400" />
            </div>
            <div>
              <h3 className="text-sm font-semibold text-[var(--color-text)]">Model</h3>
              <p className="text-[10px] text-[var(--color-text-muted)]">Active configuration</p>
            </div>
          </div>

          <div className="space-y-3">
            <InfoRow label="Model" value={data.modelInfo.name} />
            <InfoRow label="Provider" value={data.modelInfo.provider} />
            <InfoRow label="Avg Tokens/Analysis" value={data.modelInfo.avgTokensPerAnalysis.toLocaleString()} />
            <InfoRow label="Avg Response Time" value={data.modelInfo.avgResponseTime} />
            <InfoRow label="API Version" value="v1 (OpenAI-compat)" />
            <InfoRow label="Temperature" value="0.3" />
            <InfoRow label="Max Tokens" value="4,096" />
          </div>

          <div className="mt-4 p-2.5 rounded-md bg-emerald-500/5 border border-emerald-500/10">
            <div className="flex items-center gap-1.5 mb-1">
              <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse" />
              <span className="text-[10px] font-medium text-emerald-400">Model Active</span>
            </div>
            <p className="text-[10px] text-[var(--color-text-muted)]">Connected to MiMo inference endpoint</p>
          </div>
        </div>
      </div>

      {/* Recent Analyses Table */}
      <div className="rounded-xl border border-[var(--color-border-subtle)] bg-[var(--color-surface)] overflow-hidden">
        <div className="px-5 py-4 border-b border-[var(--color-border-subtle)]">
          <h3 className="text-sm font-semibold text-[var(--color-text)]">Recent Analyses</h3>
          <p className="text-xs text-[var(--color-text-muted)] mt-0.5">Token consumption per contract analysis</p>
        </div>

        <div className="overflow-x-auto">
          <table className="w-full">
            <thead>
              <tr className="border-b border-[var(--color-border-subtle)]">
                <th className="text-left px-5 py-3 text-[10px] uppercase tracking-wider font-medium text-[var(--color-text-muted)]">Contract Type</th>
                <th className="text-left px-5 py-3 text-[10px] uppercase tracking-wider font-medium text-[var(--color-text-muted)]">Parties</th>
                <th className="text-left px-5 py-3 text-[10px] uppercase tracking-wider font-medium text-[var(--color-text-muted)]">Risk Score</th>
                <th className="text-right px-5 py-3 text-[10px] uppercase tracking-wider font-medium text-[var(--color-text-muted)]">Tokens</th>
                <th className="text-right px-5 py-3 text-[10px] uppercase tracking-wider font-medium text-[var(--color-text-muted)]">Date</th>
              </tr>
            </thead>
            <tbody>
              {data.recentAnalyses.length === 0 && (
                <tr>
                  <td colSpan={5} className="px-5 py-8 text-center text-xs text-[var(--color-text-muted)]">
                    No analyses yet. Start by analyzing a contract.
                  </td>
                </tr>
              )}
              {data.recentAnalyses.map((item, i) => (
                <motion.tr
                  key={item.id}
                  initial={{ opacity: 0, x: -8 }}
                  animate={{ opacity: 1, x: 0 }}
                  transition={{ delay: i * 0.05 }}
                  className="border-b border-[var(--color-border-subtle)] last:border-0 hover:bg-[var(--color-bg)]/50 transition-colors"
                >
                  <td className="px-5 py-3">
                    <span className="text-xs font-medium text-[var(--color-text)]">{item.type}</span>
                  </td>
                  <td className="px-5 py-3">
                    <span className="text-xs text-[var(--color-text-secondary)]">{item.parties}</span>
                  </td>
                  <td className="px-5 py-3">
                    <span className={`inline-flex items-center px-2 py-0.5 rounded text-[10px] font-semibold border ${riskBg(item.riskScore)}`}>
                      <span className={riskColor(item.riskScore)}>{item.riskScore}/100</span>
                    </span>
                  </td>
                  <td className="px-5 py-3 text-right">
                    <span className="text-xs text-[var(--color-text-secondary)] font-mono">{item.tokens.toLocaleString()}</span>
                  </td>
                  <td className="px-5 py-3 text-right">
                    <span className="text-xs text-[var(--color-text-muted)]">{item.date}</span>
                  </td>
                </motion.tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* Table Footer */}
        <div className="px-5 py-3 border-t border-[var(--color-border-subtle)] bg-[var(--color-bg)]/30 flex items-center justify-between">
          <span className="text-[10px] text-[var(--color-text-muted)]">Showing 6 of {data.totalAnalyses} analyses</span>
          <span className="text-[10px] text-[var(--color-text-muted)] font-mono">
            Total: {data.recentAnalyses.reduce((acc, a) => acc + a.tokens, 0).toLocaleString()} tokens
          </span>
        </div>
      </div>
    </motion.div>
  )
}

function StatCard({ icon: Icon, label, value, sub, color }) {
  return (
    <div className="p-4 rounded-xl border border-[var(--color-border-subtle)] bg-[var(--color-surface)]">
      <div className="flex items-center gap-2 mb-2">
        <Icon size={12} className={color} />
        <span className="text-[10px] uppercase tracking-wider text-[var(--color-text-muted)]">{label}</span>
      </div>
      <p className="text-xl font-bold text-[var(--color-text)]">{value}</p>
      <p className="text-[10px] text-[var(--color-text-muted)] mt-0.5">{sub}</p>
    </div>
  )
}

function InfoRow({ label, value }) {
  return (
    <div className="flex items-center justify-between py-1.5 border-b border-[var(--color-border-subtle)] last:border-0">
      <span className="text-[10px] text-[var(--color-text-muted)]">{label}</span>
      <span className="text-[11px] font-medium text-[var(--color-text-secondary)] font-mono">{value}</span>
    </div>
  )
}
